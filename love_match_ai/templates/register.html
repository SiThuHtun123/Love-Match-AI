{% extends "base.html" %}
{% block title %}{{ _('Sign up') }} · Love Match AI 💘{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card glass reveal">
    <h2 class="auth-title">{{ _('Create your account') }} ✨</h2>
    <p class="auth-sub">{{ _('Destiny is one form away.') }}</p>
    <form method="post" action="{{ url_for('register') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label class="field">
        <span>{{ _('Username') }}</span>
        <input type="text" name="username" required minlength="3" maxlength="20" autofocus>
      </label>
      <label class="field">
        <span>{{ _('Password') }}</span>
        <input type="password" name="password" required minlength="6">
      </label>
      <label class="field">
        <span>{{ _('Confirm password') }}</span>
        <input type="password" name="confirm" required minlength="6">
      </label>
      <button type="submit" class="btn btn-primary btn-block">{{ _('Sign up') }} 💘</button>
    </form>
    <p class="auth-alt">{{ _('Already have an account?') }}
      <a href="{{ url_for('login') }}">{{ _('Login') }}</a>
    </p>
  </div>
</div>
{% endblock %}
